[General]
network = roteadormg.RoutingNet
ned-path = ./src
sim-time-limit = 10s

# Default visualizer disabled for speed in Cmdenv
record-eventlog = false

# Topologia 1 (exemplo fornecido)
[Config Topologia1]
description = "Topologia 1: 7 nós com enlaces e custos conforme exemplo"
*.numNodes = 7
*.edges = "0-1:10ms, 0-2:2ms, 1-2:4ms, 1-3:8ms, 2-4:3ms, 3-5:5ms, 4-5:1ms, 5-6:12ms"

# Topologia 2: anel de 7 nós com alguns atalhos
[Config Topologia2]
description = "Topologia 2: Anel + atalhos"
*.numNodes = 7
*.edges = "0-1:3ms, 1-2:3ms, 2-3:3ms, 3-4:3ms, 4-5:3ms, 5-6:3ms, 6-0:3ms, 0-3:5ms, 2-5:4ms"

# Topologia 3: árvore com cordas
[Config Topologia3]
description = "Topologia 3: Estrutura tipo árvore com cordas"
*.numNodes = 7
*.edges = "0-1:2ms, 0-2:6ms, 1-3:2ms, 1-4:7ms, 2-5:1ms, 2-6:9ms, 3-4:3ms, 4-5:2ms"

# Topologia 4: estrela com ligações adicionais
[Config Topologia4]
description = "Topologia 4: Estrela com ligações extras"
*.numNodes = 7
*.edges = "0-1:2ms, 0-2:2ms, 0-3:2ms, 0-4:2ms, 0-5:2ms, 0-6:2ms, 1-2:5ms, 3-4:4ms, 5-6:6ms"

# Topologia 5: malha esparsa
[Config Topologia5]
description = "Topologia 5: Malha esparsa"
*.numNodes = 7
*.edges = "0-1:4ms, 0-2:7ms, 1-3:6ms, 2-3:2ms, 2-4:5ms, 3-5:3ms, 4-5:8ms, 5-6:2ms, 1-6:10ms"